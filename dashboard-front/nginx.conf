server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # Basic SPA fallback
  location / {
    try_files $uri /index.html;
  }

  # Static assets cache (tweak as needed)
  location ~* \.(?:js|css|png|jpg|jpeg|gif|svg|woff2?)$ {
    expires 7d;
    add_header Cache-Control "public, no-transform";
    try_files $uri =404;
  }
}